name: Repository Index

on:
  workflow_dispatch:
  push:
    branches:
      - fix/repo-foundation-hardening
    paths:
      - "lua/**"
      - "gamemodes/**"
      - "entities/**"
      - "weapons/**"
      - "effects/**"
      - "tools/repository_index.py"
      - ".github/workflows/repository-index.yml"

permissions:
  contents: write

concurrency:
  group: repository-index-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate repository index
        run: python tools/repository_index.py

      - name: Commit generated index
        shell: bash
        run: |
          if git diff --quiet -- docs/generated/repository; then
            echo "Repository index is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/generated/repository
          git commit -m "chore: refresh generated repository index"
          git push
